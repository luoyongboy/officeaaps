name: AAPS CI

on:
  workflow_dispatch:
    inputs:
      buildVariant:
        description: 'Select Build Variant'
        required: true
        default: 'fullRelease'
        type: choice
        options:
          - fullRelease
          - fullDebug

jobs:
  build:
    name: Build AAPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: gradle

      - name: Skip Objectives & Expiration
        run: |
          # 1. 强制所有新手任务返回“已完成”状态
          find . -type f -name "*Objective*" | xargs -I {} sed -i 's/return false/return true/g' {} || true
          find . -type f -name "*Objective*" | xargs -I {} sed -i 's/isCompleted() = false/isCompleted() = true/g' {} || true
          
          # 2. 暴力关闭过期检测逻辑
          find . -type f \( -name "*.kt" -o -name "*.java" \) | xargs sed -i 's/System.currentTimeMillis() > END_OF_LIFE/false/g' || true
          find . -type f \( -name "*.kt" -o -name "*.java" \) | xargs sed -i 's/System.currentTimeMillis() > expirationDate/false/g' || true

          # 3. 【关键】伪装 Git 状态，防止 Gradle 报错 "uncommitted changes"
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add .
          git commit -m "Apply bypass patches" || true

      - name: Generate Self-Signed Keystore
        run: |
          keytool -genkey -v -keystore release.jks -keyalg RSA -keysize 2048 -validity 36500 \
            -alias key0 -keypass "${{ secrets.ALIAS_PASSWORD }}" -storepass "${{ secrets.SIGNING_PASSWORD }}" \
            -dname "CN=AAPS, OU=AAPS, O=AAPS, L=City, S=State, C=CH"

      - name: Build APKs
        run: |
          chmod +x gradlew
          # 加上 -x check 跳过某些不必要的检查
          ./gradlew :app:assemble${{ github.event.inputs.buildVariant }} \
            -Pandroid.injected.signing.store.file=$(pwd)/release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.SIGNING_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="key0" \
            -Pandroid.injected.signing.key.password="${{ secrets.ALIAS_PASSWORD }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aaps-final-apk
          path: app/build/outputs/apk/full/release/*.apk
