name: AAPS CI

on:
  workflow_dispatch:
    inputs:
      buildVariant:
        description: 'Select Build Variant'
        required: true
        default: 'fullRelease'
        type: choice
        options:
          - fullRelease
          - fullDebug

jobs:
  build:
    name: Build AAPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: gradle

      - name: Generate Self-Signed Keystore
        run: |
          # 这一步是关键：如果没有签名文件，我们现场造一个，有效期100年
          keytool -genkey -v -keystore release.jks -keyalg RSA -keysize 2048 -validity 36500 \
            -alias key0 -keypass "${{ secrets.ALIAS_PASSWORD }}" -storepass "${{ secrets.SIGNING_PASSWORD }}" \
            -dname "CN=AAPS, OU=AAPS, O=AAPS, L=City, S=State, C=CH"

      - name: Build APKs
        run: |
          chmod +x gradlew
          # 强制指定使用刚才生成的 release.jks 进行签名
          ./gradlew :app:assemble${{ github.event.inputs.buildVariant }} \
            -Pandroid.injected.signing.store.file=$(pwd)/release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.SIGNING_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="key0" \
            -Pandroid.injected.signing.key.password="${{ secrets.ALIAS_PASSWORD }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aaps-signed-apk
          path: app/build/outputs/apk/full/release/*.apk
